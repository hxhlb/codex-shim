[project]
name = "codex-factory-shim"
version = "0.1.0"
description = "Opt-in Codex BYOK shim generated from Factory custom models."
requires-python = ">=3.11"
dependencies = [
  "aiohttp>=3.9",
]

[project.scripts]
codex-shim = "codex_shim.cli:main"

[tool.pytest.ini_options]
testpaths = ["tests"]
asyncio_mode = "auto"

